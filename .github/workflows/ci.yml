name: CI Pipeline

on:
  push:
    # Añadimos explícitamente las ramas para evitar confusiones
    branches: [main, feature/docker]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: mkdir -p data
        working-directory: ./apps/promptlab/backend
      - run: npm test
        working-directory: ./apps/promptlab/backend
        env:
          NODE_ENV: test
          DB_PATH: /tmp/promptlab-ci.db

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: npm run lint
        working-directory: ./apps/promptlab/backend

  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: read
      packages: write
    # Si los tests fallan (el Error 500 que tenías antes), este job no se ejecutará.
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        id: owner
        run: |
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_OUTPUT

      - name: Build and push API image
        # QUITAMOS el IF de main para que funcione en tu rama de práctica
        uses: docker/build-push-action@v6
        with:
          context: ./apps/promptlab/backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/promptlab-api:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/promptlab-api:${{ github.sha }}

      - name: Build and push Frontend image
        # QUITAMOS el IF de main para que funcione en tu rama de práctica
        uses: docker/build-push-action@v6
        with:
          context: ./apps/promptlab/frontend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/promptlab-frontend:latest
            ghcr.io/${{ steps.owner.outputs.owner }}/promptlab-frontend:${{ github.sha }}