name: CI Pipeline

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: ./apps/promptlab/backend
      - run: mkdir -p data
        working-directory: ./apps/promptlab/backend
      - run: npm test
        working-directory: ./apps/promptlab/backend
        env:
          DB_PATH: /tmp/promptlab-ci.db