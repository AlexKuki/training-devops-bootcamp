name: CI Pipeline

on:
  push:
    branches: [feature/docker]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Levantamos la base de datos como un servicio de Docker
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: promptlab_test
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        # Esperamos a que la DB esté lista para recibir conexiones
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      API_PORT: 3001
      FRONTEND_PORT: 9090
      NODE_ENV: test
      # ¡Importante! La URL de conexión para que el backend la encuentre
      DATABASE_URL: postgresql://postgres:password@localhost:5432/promptlab_test
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        working-directory: ./apps/promptlab/backend

      # Si usas Prisma o Sequelize, necesitas correr las migraciones antes de testear
      - name: Run migrations
        run: npx prisma migrate deploy || npm run migrate
        working-directory: ./apps/promptlab/backend

      - name: Run tests
        run: npm test
        working-directory: ./apps/promptlab/backend